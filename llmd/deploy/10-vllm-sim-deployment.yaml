# CPU-only vLLM simulator backend for llm-d routing proof.
#
# Why this exists: The GodMode consensus (docs/llmd-v2-decision.md)
# flagged our H100 cluster has zero free GPU capacity today, so we
# cannot boot the real vllm-deepep-v2:0.19.1-shim-h100-20260428 image
# as a backend for the llm-d EPP. The upstream llm-d project publishes
# ghcr.io/llm-d/llm-d-inference-sim specifically for this - it mimics
# the vLLM /v1/* API on CPU, returning canned tokens without accelerator.
#
# What lives here:
#   Deployment   vllm-sim (2 replicas, CPU-only)
#   Service      vllm-sim (ClusterIP, port 8000) - EPP targets this
#
# Label contract: llm-d.ai/model=qwen3-30b-a3b-fp8
# That label is what the EPP's InferencePool selector in 30-*.yaml
# matches on; it must agree between this deployment and the pool CR.
#
# Swap-in for real DeepEP V2 backend: when GPU capacity frees up,
# delete this Deployment + Service and replace with the vllm-deepep-v2
# manifest in integrations/vllm-deepep-v2/deploy/smoke-h200-d27.yaml
# (re-labeled to llm-d.ai/model=qwen3-30b-a3b-fp8). The EPP + scheduler
# never needs to change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim
  namespace: deepep-llmd-shim-test
  labels:
    app: vllm-sim
    llm-d.ai/model: qwen3-30b-a3b-fp8
    llm-d.ai/role: decode
    llm-d.ai/guide: deepep-v2-overlay
    llm-d.ai/inference-serving: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-sim
      llm-d.ai/model: qwen3-30b-a3b-fp8
  template:
    metadata:
      labels:
        app: vllm-sim
        llm-d.ai/model: qwen3-30b-a3b-fp8
        llm-d.ai/role: decode
        llm-d.ai/guide: deepep-v2-overlay
        llm-d.ai/inference-serving: "true"
    spec:
      containers:
      - name: vllm
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        imagePullPolicy: IfNotPresent
        args:
        # Mimic what vllm-deepep-v2:0.19.1-shim-h100-20260428 serves.
        # The simulator accepts --model / --served-model-name / --port
        # identical to real vLLM, so switching to a real backend only
        # changes the image ref.
        - "--port=8000"
        - "--model=Qwen/Qwen3-30B-A3B-FP8"
        - "--served-model-name=Qwen/Qwen3-30B-A3B-FP8"
        - "--time-to-first-token=100"
        - "--inter-token-latency=20"
        - "--max-num-seqs=32"
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /v1/models
            port: http
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /v1/models
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim
  namespace: deepep-llmd-shim-test
  labels:
    app: vllm-sim
    llm-d.ai/model: qwen3-30b-a3b-fp8
spec:
  type: ClusterIP
  selector:
    app: vllm-sim
    llm-d.ai/model: qwen3-30b-a3b-fp8
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
